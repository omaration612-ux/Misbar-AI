<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISBAR AI | رادار مِسبار - أكبر دليل لأدوات الذكاء الاصطناعي</title>
    <meta name="description" content="اكتشف أكثر من 30,000 أداة ذكاء اصطناعي عبر MISBAR AI. رادارك الخاص للبحث الفوري عن أفضل الحلول التقنية المحدثة لحظياً.">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>

    <header class="main-header">
        <div class="auth-section">
            <button class="signup-link">Sign up</button>
            <button class="signin-btn">Sign in</button>
        </div>
        <div class="search-top-box">
            <input type="text" id="smartSearch" placeholder="...Search 30,000+ AI tools">
        </div>
        <div class="brand-zone">
            <div class="lang-selector">🌐 ▼</div>
<h1 class="main-logo">Misbar <span class="ai-glow">Ai</span></h1>        </div>
    </header>

    <section class="rolling-features">
        <div class="feat-track">
            <div class="f-card gold-style"><span>مختارات اليوم</span><h2>Midjourney 2</h2></div>
            <div class="f-card glass-style"><span>مختارات اليوم</span><h2>ChatGPT 1</h2></div>
            <div class="f-card blue-style"><span>مختارات اليوم</span><h2>Claude 3</h2></div>
            <div class="f-card green-style"><span>مختارات اليوم</span><h2>Sora AI</h2></div>
            <div class="f-card red-style"><span>مختارات اليوم</span><h2>Luma Dream</h2></div>
            <div class="f-card cyan-style"><span>مختارات اليوم</span><h2>Gemini Pro</h2></div>
        </div>
    </section>

    <section class="search-container-pro">
        <div class="color-tags-pro">
            <button class="tag-pro active">All</button>
            <button class="tag-pro">Writing</button>
            <button class="tag-pro">Image</button>
            <button class="tag-pro">Video</button>
            <button class="tag-pro">Coding</button>
            <button class="tag-pro">Audio</button>
            </div>
        
        <div id="ad-placement" class="google-ads-area">مساحة إعلانية Google Ads قريباً</div>
    </section>

    <main id="mainGrid" class="grid-6x10">
        </main>

    <div class="pagination-glass-rolling">
        <div class="rolling-pages">
            <span class="p-num active">1</span>
            <span class="p-num">2</span>
            <span class="p-num">3</span>
            <span class="p-num">4</span>
            <span class="p-num">5</span>
            <span class="p-num">6</span>
            </div>
    </div>

    <footer class="mega-footer-contrast">
        <div class="f-grid">
<div class="f-col">
    <h2>Misbar <span class="ai-glow">Ai</span></h2>
    <p>مِسبارك العالمي للذكاء الاصطناعي</p>
</div>
            <div class="f-col">
                <h3>روابط</h3>
                <a href="#">اتصل بنا</a>
                <a href="#">الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        particlesJS('particles-js', {
            "particles": { 
                "number": { "value": 90 }, 
                "color": { "value": "#00f2ff" }, 
                "shape": { "type": "circle" }, 
                "opacity": { "value": 0.3 }, 
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.2, "width": 1 }, 
                "move": { "enable": true, "speed": 2 } 
            }
        });
    </script>
    
<script type="module" src="injector.js"></script>

    <script src="fixer.js"></script>
    <script src="misbar-core.js"></script> 

    <script src="misbar-brain.js"></script>
</body>
</html>
