<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MISBAR AI | رادار مِسبار</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    <header class="main-header">
        <div class="auth-section">
            <button class="signup-link">Sign up</button>
            <button class="signin-btn">Sign in</button>
        </div>
        <div class="search-top">
            <input type="text" id="smartSearch" placeholder="...Search 15,000 tools">
        </div>
        <div class="brand-area">
            <div class="lang-selector">🌐 ▼</div>
            <h1 class="logo-text">Misbar <span class="ai-glow">AI</span></h1>
        </div>
    </header>

    <section class="rolling-features">
        <div class="feat-track">
            <div class="f-card gold"><span>مختارات اليوم</span><h2>Midjourney 2</h2></div>
            <div class="f-card glass"><span>مختارات اليوم</span><h2>ChatGPT 1</h2></div>
            <div class="f-card blue"><span>مختارات اليوم</span><h2>Claude 3</h2></div>
            <div class="f-card green"><span>مختارات اليوم</span><h2>Sora AI</h2></div>
            <div class="f-card red"><span>مختارات اليوم</span><h2>Luma</h2></div>
            <div class="f-card purple"><span>مختارات اليوم</span><h2>Gemini</h2></div>
        </div>
    </section>

    <nav class="filter-navigation">
        <div class="tags-row">
            <button class="tag active">All</button>
            <button class="tag">Writing</button><button class="tag">Image</button>
            <button class="tag">Video</button><button class="tag">Coding</button>
            <button class="tag">Audio</button>
        </div>
    </nav>

    <main id="mainGrid" class="grid-6x10"></main>

    <div class="pagination-glass-rolling">
        <div class="p-track">
            <span class="p-num active">1</span><span class="p-num">2</span><span class="p-num">3</span>
            <span class="p-num">4</span><span class="p-num">5</span><span class="p-num">6</span>
        </div>
    </div>

    <div class="ads-placeholder">إعلانات قوقل قريباً</div>

    <footer class="mega-footer-contrast">
        <div class="f-inner">
            <div class="f-logo">Misbar <span class="ai-glow">AI</span></div>
            <p>أكبر رادار لأدوات الذكاء الاصطناعي</p>
        </div>
    </footer>

    <script>
        particlesJS('particles-js', {
            "particles": { "number": { "value": 100 }, "color": { "value": "#00f2ff" }, "opacity": { "value": 0.3 }, "line_linked": { "enable": true, "color": "#00f2ff", "opacity": 0.2 } }
        });
    </script>
    <script src="engine.js" type="module"></script>
</body>
</html>
