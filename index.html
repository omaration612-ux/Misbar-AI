<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISBAR AI | رادار مِسبار</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="auth-box">
            <button class="auth-btn signup">Sign Up</button>
            <button class="auth-btn login">Sign In</button>
        </div>
        <div class="logo-wrapper">
            <span class="misbar-logo">Misbar <span class="ai-text">AI</span></span>
            <div class="dropdown world-lang">
                <span class="world-icon">🌐 ▼</span>
                <div class="dropdown-content glass-dark">
                    <a href="#">العربية</a><a href="#">English</a><a href="#">Français</a><a href="#">Español</a>
                    <a href="#">Deutsch</a><a href="#">Italiano</a><a href="#">Türkçe</a><a href="#">日本語</a>
                    <a href="#">한국어</a><a href="#">中文</a>
                </div>
            </div>
        </div>
    </header>

    <section class="features-slider">
        <div class="slider-container">
            <div class="f-card gold"><h4>Midjourney v6</h4><p>مختارات اليوم</p></div>
            <div class="f-card blue"><h4>ChatGPT-5</h4><p>مختارات اليوم</p></div>
        </div>
    </section>

    <section class="search-section">
        <div class="search-container">
            <div class="free-filter">
                <span>مجاني فقط</span>
                <label class="switch"><input type="checkbox" id="freeOnly"><span class="slider-round"></span></label>
            </div>
            <input type="text" id="smartSearch" placeholder="Search 30,000+ AI tools...">
        </div>
        <div class="filters-row">
            <button class="filter-tag active">All</button>
            <button class="filter-tag">Writing</button><button class="filter-tag">Image</button>
            <button class="filter-tag">Video</button><button class="filter-tag">Coding</button>
            <button class="filter-tag">Audio</button><button class="filter-tag">Design</button>
            <button class="filter-tag">Marketing</button><button class="filter-tag">Data</button>
            <div class="dropdown"><button class="filter-tag">المزيد ▼</button>
                <div class="dropdown-content glass-white">
                    <a href="#">تعليم</a><a href="#">طب</a><a href="#">أعمال</a><a href="#">ترجمة</a><a href="#">ألعاب</a>
                </div>
            </div>
        </div>
    </section>

    <main id="mainGrid" class="grid-6x10"></main>

    <nav class="pagination-glass">
        <button class="page-num">السابق</button>
        <button class="page-num active">1</button>
        <button class="page-num">التالي</button>
    </nav>

    <div class="ads-space">مساحة إعلانية</div>

    <footer class="mega-footer">
        <div class="footer-grid">
            <div class="footer-col"><h3>Misbar AI</h3><p>أكبر رادار للذكاء الاصطناعي.</p></div>
            <div class="footer-col"><h3>روابط</h3><a href="#">اتصل بنا</a></div>
        </div>
        <div class="footer-bottom">© 2026 رادار مِسبار</div>
    </footer>
    <script src="engine.js" type="module"></script>
</body>
</html>
