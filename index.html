<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MISBAR AI | رادار مِسبار العالمي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="auth-group">
            <button class="btn-outline">Sign In</button>
            <button class="btn-white">Sign Up</button>
        </div>
        <div class="dropdown">
            <button class="dropbtn">🌐 اللغات ▼</button>
            <div class="dropdown-content">
                <a href="#">العربية</a><a href="#">English</a><a href="#">Français</a>
                <a href="#">Español</a><a href="#">Deutsch</a><a href="#">中文</a>
                <a href="#">日本語</a><a href="#">Русский</a><a href="#">Türkçe</a><a href="#">हिन्दी</a>
            </div>
        </div>
    </header>

    <section class="control-panel">
        <div class="search-row">
            <input type="text" id="smartSearch" placeholder="ابحث في 30,000 أداة...">
            <div class="switch-box">
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                <span>مجاني</span>
            </div>
        </div>
        
        <div class="filter-bar">
            <button class="active">الكل</button>
            <button>فيديو</button><button>برمجة</button><button>تصميم</button>
            <div class="dropdown">
                <button class="dropbtn">المزيد ▼</button>
                <div class="dropdown-content">
                    <a href="#">صوتيات</a><a href="#">تسويق</a><a href="#">تعليم</a><a href="#">أعمال</a>
                </div>
            </div>
        </div>
    </section>

    <main id="mainGrid"></main>

    <nav class="pagination touch-scroll">
        <span class="page-num">1</span><span class="page-num active">2</span><span class="page-num">3</span>
    </nav>

    <footer class="footer-main">
        <p>© 2026 مِسبار AI - جميع الحقوق محفوظة</p>
    </footer>

    <script src="engine.js" type="module"></script>
</body>
</html>
