<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رادار مِسبار | AI RADAR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="particles-js"></div> 

    <header class="apple-header">
        <div class="header-left">
            <div class="lang-selector">
                <i class="fas fa-globe"></i>
                <select id="langSelect">
                    <option>العربية</option>
                    <option>English</option>
                    <option>中文</option>
                </select>
            </div>
            <div class="toggle-group">
                <span>مجاني</span>
                <label class="switch">
                    <input type="checkbox" id="pricingToggle">
                    <span class="slider round"></span>
                </label>
                <span>مدفوع</span>
            </div>
        </div>
        <div class="header-right">
            <a href="#" class="auth-link">Sign In</a>
            <a href="#" class="signup-btn">Sign Up</a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>M I S B A R</h1>
            <p class="typewriter">مِسبار يرقب أدوات الذكاء الاصطناعي في مكان واحد...</p>
        </div>
    </section>

    <section class="featured">
        <h2 class="section-title">Today's Pick ✨</h2>
        <div class="featured-slider">
            <div class="f-card"><h3>SORA</h3><p>Video Generation</p></div>
            <div class="f-card"><h3>GPT-4o</h3><p>Smart Assistant</p></div>
            <div class="f-card"><h3>Midjourney</h3><p>Art Design</p></div>
            <div class="f-card"><h3>Claude 3</h3><p>Coding Pro</p></div>
        </div>
    </section>

    <section class="search-section">
        <div class="search-wrapper">
            <input type="text" placeholder="ابحث بين 30,000 أداة ذكاء اصطناعي...">
        </div>
        <div class="filter-bar" id="filterBar">
            <span class="chip active">الكل</span>
            <span class="chip">صور</span>
            <span class="chip">برمجة</span>
            <span class="chip">فيديو</span>
        </div>
    </section>

    <main class="main-grid" id="toolsGrid"></main>

    <div class="google-nav">
        <div class="dots" id="pageDots"></div>
        <button class="next-btn">المزيد <i class="fas fa-chevron-left"></i></button>
    </div>

    <div class="ad-banner">مساحة إعلانية لقوقل</div>

    <footer class="main-footer">
        <div class="footer-line"></div>
        <p>© 2026 رادار مِسبار. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
