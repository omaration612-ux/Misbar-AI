<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | رادار مِسبار</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="nav-right">
            <div class="lang-dropdown">
                <span class="lang-trigger">🌐</span>
                <div class="lang-menu">
                    <a href="#">العربية</a><a href="#">English</a><a href="#">Français</a>
                    <a href="#">Español</a><a href="#">Deutsch</a><a href="#">日本語</a>
                    <a href="#">中文</a><a href="#">Русский</a><a href="#">Italiano</a><a href="#">Türkçe</a>
                </div>
            </div>
            <div class="logo">Misbar AI</div>
        </div>

        <div class="nav-center">
            <div class="search-wrapper">
                <input type="text" id="smartSearch" class="search-input" placeholder="ابحث في الأدوات...">
                <button class="search-btn">بحث</button>
            </div>
        </div>

        <div class="nav-left"><button class="btn-auth">دخول</button></div>
    </nav>

    <div class="featured-slider" id="featuredZone"></div>

    <div class="filter-container">
        <div class="filter-tags">
            <div class="free-toggle-wrapper">
                <span>مجاني فقط</span>
                <label class="switch">
                    <input type="checkbox" id="freeOnlySwitch">
                    <span class="slider"></span>
                </label>
            </div>
            
            <button class="tag-btn active" data-category="All">الكل</button>
            <button class="tag-btn" data-category="Writing">كتابة</button>
            <button class="tag-btn" data-category="Image">صور</button>
            <button class="tag-btn" data-category="Video">فيديو</button>
            
            <div class="more-dropdown">
                <button class="tag-btn">المزيد ▼</button>
                <div class="more-content">
                    <button data-category="Coding">برمجة</button><button data-category="SEO">سيو</button>
                    <button data-category="Audio">صوت</button><button data-category="Design">تصميم</button>
                </div>
            </div>
        </div>
    </div>

    <div class="grid" id="mainGrid"></div>

    <div class="pagination">
        <a href="#" class="page-link active">1</a><a href="#" class="page-link">2</a>
        <a href="#" class="page-link">3</a><a href="#" class="page-link">4</a>
        <a href="#" class="page-link">5</a>
    </div>

    <footer class="main-footer">
        <div class="footer-extra-space"></div>
        <div class="footer-content">
            <h3>Misbar AI</h3>
            <p>دليلك الشامل لمستقبل الذكاء الاصطناعي</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
