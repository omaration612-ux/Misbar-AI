<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | مِسبار للذكاء الاصطناعي</title>
    
    <meta name="description" content="مسبار AI - دليل أدوات الذكاء الاصطناعي الأكبر عالمياً">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; }
        #app { position: relative; z-index: 10; }
        .nav { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 12px 5%; border-bottom: 1px solid #222; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #00d1ff; text-decoration: none; }
        .search-area { flex: 0 1 40%; background: #1c1c1e; border-radius: 12px; border: 1px solid #333; padding: 5px 15px; display: flex; }
        .search-input { background: none; border: none; color: #fff; width: 100%; outline: none; padding: 8px; font-size: 0.9rem; }
        .featured-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 5%; gap: 20px; scrollbar-width: none; }
        .featured-slider::-webkit-scrollbar { display: none; }
        .big-card { min-width: 85%; height: 320px; border-radius: 30px; scroll-snap-align: center; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; border: 1px solid #333; background-size: cover; background-position: center; }
        .big-card::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .big-card-content { position: relative; z-index: 2; }
        .filter-bar { display: flex; gap: 10px; padding: 10px 5%; overflow-x: auto; scrollbar-width: none; position: sticky; top: 70px; background: rgba(0,0,0,0.5); z-index: 100; }
        .f-btn { background: #1c1c1e; border: 1px solid #2c2c2e; padding: 8px 22px; border-radius: 20px; font-size: 0.85rem; color: #8e8e93; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .f-btn.active { background: #007aff; color: #fff; border-color: #007aff; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: rgba(28,28,30,0.7); border: 1px solid #222; border-radius: 25px; padding: 20px; text-align: center; transition: 0.3s; }
        .tool-icon { width: 60px; height: 60px; background: linear-gradient(45deg, #007aff, #00d1ff); border-radius: 18px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .try-btn { background: #007aff; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="app">
        <nav class="nav">
            <a href="#" class="logo">Misbar AI</a>
            <div class="search-area">
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث في 15,000 أداة...">
            </div>
            <div style="color:#007aff; font-weight:bold; cursor:pointer; font-size:0.9rem;">Sign up</div>
        </nav>

        <div class="featured-slider">
            <div class="big-card" style="background-image: url('https://picsum.photos/800/400?sig=11')">
                <div class="big-card-content">
                    <span style="color:#00d1ff; font-weight:bold; font-size:0.8rem;">مختارات مِسبار</span>
                    <h2 style="font-size:1.8rem; margin:5px 0;">ثورة التصميم بالذكاء الاصطناعي</h2>
                    <p style="color:#ccc;">اكتشف الأدوات التي ستغير طريقة عملك للأبد.</p>
                </div>
            </div>
        </div>

        <div class="filter-bar" id="filterBar"></div>
        <div class="grid" id="toolsGrid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="script.js"></script> </body>
</html>
