<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | رادار مِسبار</title>
    
    <meta name="description" content="رادار مسبار - الدليل الأكبر لأدوات الذكاء الاصطناعي">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        /* التنسيقات الأساسية المستوحاة من صورتك */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        .apple-nav { position: sticky; top: 0; backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; border-bottom: 0.5px solid #333; height: 75px; }
        .logo { font-size: 1.7rem; font-weight: 900; color: #00d1ff; }
        
        .nav-center { display: flex; align-items: center; gap: 20px; flex-grow: 1; justify-content: center; }
        .search-wrapper { display: flex; background: rgba(44, 44, 46, 0.8); border: 1px solid #333; border-radius: 14px; width: 350px; }
        .search-input { background: transparent; border: none; padding: 10px; color: #fff; flex-grow: 1; outline: none; font-family: 'Cairo'; }
        .search-btn { background: #111; color: #fff; border: none; padding: 0 15px; cursor: pointer; border-right: 1px solid #333; }

        /* قسم الهيرو (كما في الصورة) */
        .featured-slider { display: flex; justify-content: center; gap: 20px; padding: 40px 5%; overflow-x: auto; scrollbar-width: none; }
        .hero-card { min-width: 380px; height: 250px; border-radius: 30px; position: relative; overflow: hidden; border: 1px solid #333; flex-shrink: 0; }
        .hero-info { position: absolute; bottom: 20px; right: 20px; text-align: right; z-index: 2; }

        /* التصنيفات (شريط التصنيفات) */
        .filter-tags { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
        .tag-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .tag-btn.active { background: #007aff; border-color: #007aff; }

        /* شبكة الأدوات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 30px 5%; }
        .card { background: rgba(28,28,30,0.6); border-radius: 25px; padding: 20px; text-align: center; border: 1px solid #222; backdrop-filter: blur(10px); transition: 0.4s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: #007aff; }
        
        .tool-img { width: 60px; height: 60px; border-radius: 15px; margin-bottom: 15px; object-fit: cover; }
        .btn-try { background: #007aff; color: white; text-decoration: none; display: block; padding: 10px; border-radius: 12px; font-weight: bold; margin-top: 15px; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="logo">Misbar AI</div>
        <div class="nav-center">
            <div class="search-wrapper">
                <input type="text" id="smartSearch" class="search-input" placeholder="ابحث في 30,000 أداة...">
                <button class="search-btn">بحث</button>
            </div>
        </div>
        <button style="background:transparent; border:1px solid #007aff; color:#007aff; padding:8px 20px; border-radius:10px; cursor:pointer;">دخول</button>
    </nav>

    <div class="featured-slider">
        <div class="hero-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), url('https://picsum.photos/400/300?sig=23') center/cover;">
            <div class="hero-info">
                <h3 style="margin:0">Midjourney v7</h3>
                <p style="font-size:0.8rem; color:#ccc">توليد صور بجودة سينمائية مذهلة.</p>
            </div>
        </div>
        <div class="hero-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), url('https://picsum.photos/400/300?sig=21') center/cover;">
            <div class="hero-info">
                <h3 style="margin:0">Sora Video</h3>
                <p style="font-size:0.8rem; color:#ccc">تحويل النصوص لفيديوهات واقعية.</p>
            </div>
        </div>
    </div>

    <div class="filter-tags">
        <button class="tag-btn active">الكل</button>
        <button class="tag-btn">Writing</button>
        <button class="tag-btn">Image Generation</button>
        <button class="tag-btn">Video Editing</button>
    </div>

    <div class="grid" id="mainGrid"></div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // 1. إعداد Firebase (تأكد من استخدام بياناتك الحقيقية)
        const firebaseConfig = {
            projectId: "misbar-2026",
            // أضف الـ ApiKey والـ AppId الخاصين بك هنا
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. تفعيل الخلفية
        particlesJS('particles-js', { "particles": { "number": { "value": 40 }, "opacity": { "value": 0.2 }, "move": { "speed": 0.5 } } });

        // 3. جلب الـ 30,000 أداة (بشكل جزئي للسرعة)
        async function loadTools() {
            const mainGrid = document.getElementById('mainGrid');
            mainGrid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">جاري تحميل أدوات مِسبار...</p>';

            try {
                const snapshot = await db.collection('tools').limit(100).get();
                const tools = snapshot.docs.map(doc => doc.data());
                
                mainGrid.innerHTML = tools.map(tool => `
                    <div class="card">
                        <img src="${tool.image || 'https://logo.clearbit.com/openai.com'}" class="tool-img" onerror="this.src='https://ui-avatars.com/api/?name=${tool.title}'">
                        <div style="font-weight:900; margin-bottom:10px;">${tool.title}</div>
                        <div style="font-size:0.8rem; color:#8e8e93; height:45px; overflow:hidden;">${tool.description}</div>
                        <a href="${tool.original_link}" target="_blank" class="btn-try">جرب الآن</a>
                    </div>
                `).join('');
            } catch (e) {
                mainGrid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:red;">حدث خطأ في جلب البيانات.</p>';
            }
        }

        // 4. البحث الفوري
        document.getElementById('smartSearch').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(c => c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none');
        };

        loadTools();
    </script>
</body>
</html>
