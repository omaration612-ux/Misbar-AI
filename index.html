<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار مِسبار | AI RADAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* الهيدر */
        .apple-nav { position: sticky; top: 0; backdrop-filter: blur(20px); background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; z-index: 1000; border-bottom: 0.5px solid #333; height: 60px; }
        .logo { font-size: 1.5rem; font-weight: 900; background: linear-gradient(to right, #00d1ff, #007aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-bar { background: rgba(44, 44, 46, 0.8); border: 1px solid #333; padding: 10px 15px; border-radius: 12px; color: #fff; outline: none; width: 300px; }

        /* الهيرو كاردز */
        .featured-slider { display: flex; padding: 20px 5%; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .hero-card { min-width: 300px; height: 200px; border-radius: 25px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border: 1px solid #333; flex-shrink: 0; }

        /* الفلترة */
        .filter-tags { display: flex; gap: 10px; padding: 10px 5%; overflow-x: auto; scrollbar-width: none; }
        .tag-btn { background: rgba(255, 255, 255, 0.08); color: #eee; border: 1px solid rgba(255, 255, 255, 0.1); padding: 6px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .tag-btn.active { background: #007aff; }

        /* الشبكة (60 بطاقة) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; min-height: 800px; }
        .card { background: rgba(28, 28, 30, 0.6); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; position: relative; backdrop-filter: blur(10px); }
        .tool-logo { width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
        .badge { position: absolute; top: 10px; left: 10px; font-size: 9px; padding: 2px 8px; border-radius: 8px; }
        .free { background: rgba(52, 199, 89, 0.2); color: #34c759; }
        .paid { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .btn-try { background: #007aff; color: white; text-decoration: none; display: block; padding: 7px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; }

        /* منطقة الترقيم (Pagination) */
        .pagination-container { display: flex; justify-content: center; padding: 40px 0; background: linear-gradient(transparent, #000); }
        .pagination { display: flex; gap: 8px; }
        .page-link { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #333; cursor: pointer; color: #fff; text-decoration: none; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .page-link.active { background: #007aff; border-color: #007aff; font-weight: bold; }
        .page-link:hover:not(.active) { background: rgba(255,255,255,0.1); }

        /* منطقة الـ FOOTER الجديدة */
        footer { background: #0a0a0a; padding: 60px 5% 30px; border-top: 0.5px solid #333; margin-top: 50px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px; }
        .footer-section h4 { color: #007aff; margin-bottom: 20px; }
        .footer-section p, .footer-section a { color: #8e8e93; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .footer-bottom { border-top: 0.5px solid #222; padding-top: 20px; text-align: center; color: #444; font-size: 0.8rem; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="logo">رادار مِسبار</div>
        <input type="text" id="smartSearch" class="search-bar" placeholder="ابحث في 30,000 أداة...">
        <div style="gap: 10px; display: flex;">
            <span style="color: #007aff; cursor: pointer;">دخول</span>
        </div>
    </nav>

    <div class="featured-slider" id="featuredZone"></div>

    <div class="filter-tags" id="categoryFilters">
        <button class="tag-btn active" data-category="All">الكل</button>
        <button class="tag-btn" data-category="Writing">Writing</button>
        <button class="tag-btn" data-category="Image">Image</button>
        <button class="tag-btn" data-category="Video">Video</button>
        <button class="tag-btn" data-category="Coding">Coding</button>
    </div>

    <div class="grid" id="mainGrid"></div>

    <div class="pagination-container">
        <div class="pagination">

            <div class="page-link">3</div>
            <div class="page-link">4</div>
            <div class="page-link">»</div>
        </div>
    </div>

    <footer>
