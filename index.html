<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | رادار مِسبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="nav-right">
            <div class="logo">Misbar AI</div>
        </div>
        <div class="nav-center">
            <div class="search-wrapper">
                <input type="text" id="smartSearch" class="search-input" placeholder="ابحث في 30,000 أداة ذكية...">
                <button class="search-btn">بحث</button>
            </div>
        </div>
        <div class="nav-left">
            <div class="lang-dropdown">
                <span class="lang-trigger">🌐</span>
                <div class="lang-menu">
                    <a href="#">العربية</a><a href="#">English</a>
                </div>
            </div>
            <button class="btn-auth">دخول</button>
        </div>
    </nav>

    <div class="featured-slider" id="featuredZone"></div>

    <div class="filter-bar">
        <div class="free-toggle">
            <span>مجاني فقط</span>
            <label class="switch">
                <input type="checkbox" id="freeOnlySwitch">
                <span class="slider"></span>
            </label>
        </div>
        <div class="filter-tags">
            <button class="tag-btn active" data-category="All">الكل</button>
            <button class="tag-btn" data-category="Writing">كتابة</button>
            <button class="tag-btn" data-category="Image">صور</button>
            <button class="tag-btn" data-category="Video">فيديو</button>
            <button class="tag-btn" data-category="Coding">برمجة</button>
        </div>
    </div>

    <div class="grid" id="mainGrid"></div>

    <div class="pagination">
        <span class="page-link active">1</span>
        <span class="page-link">2</span>
        <span class="page-link">3</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
