<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISBAR AI | رادار مِسبار - دليل أدوات الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <nav class="navbar">
        <div class="nav-right">
            <span class="logo">Misbar AI</span>
            <div class="lang-selector">
                🌐
                <div class="lang-menu">
                    <a href="#" onclick="changeLanguage('ar')">العربية</a>
                    <a href="#" onclick="changeLanguage('en')">English</a>
                    <a href="#" onclick="changeLanguage('ja')">日本語</a>
                    </div>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="smartSearch" placeholder="ابحث في 30,000 أداة...">
            <button onclick="injectTools()">بحث</button>
        </div>
        <div class="nav-left">
            <a href="#">Sign in</a>
            <a href="#" class="btn-signup">Sign up</a>
        </div>
    </nav>

    <section class="featured-rolling" id="featuredArea">
        <div class="hero-card">
            <span class="label">مختارات اليوم</span>
            <h2>ChatGPT 1</h2>
            <p>اكتشف القوة الحقيقية للذكاء الاصطناعي مع مسبار.</p>
        </div>
        <div class="hero-card gold">
            <span class="label">مختارات اليوم</span>
            <h2>Midjourney 2</h2>
            <p>اكتشف القوة الحقيقية للذكاء الاصطناعي مع مسبار.</p>
        </div>
    </section>

    <div class="filter-bar">
        <div class="tags">
            <button class="tag active">All</button>
            <button class="tag">Writing</button>
            <button class="tag">Image</button>
            <button class="tag">More ▾</button>
        </div>
        <div class="monetization-gate">
            <span>مجاني فقط</span>
            <label class="switch"><input type="checkbox" id="freeOnly"><span class="slider"></span></label>
        </div>
    </div>

    <main class="tools-grid" id="mainGrid"></main>

    <div class="glass-pagination" id="pageScroll">
        </div>

    <footer class="footer">
        رادار مسبار - يحتوي حالياً على <span id="toolsCounter">30,016</span> أداة
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
