<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | مِسبار للذكاء الاصطناعي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: #000; color: #fff; direction: rtl; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        
        /* الهيدر */
        .nav { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 12px 5%; border-bottom: 1px solid #222; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #00d1ff; }
        .search-area { display: flex; width: 35%; gap: 8px; }
        .in-s { flex: 1; background: #1c1c1e; border: 1px solid #333; padding: 10px; border-radius: 12px; color: #fff; outline: none; }
        .btn-s { background: #000; color: #fff; border: 1px solid #333; padding: 0 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .nav-r { display: flex; gap: 15px; align-items: center; font-size: 0.85rem; }

        /* شريط الفلاتر الـ 13 (طلبك) */
        .filter-bar { display: flex; gap: 10px; padding: 15px 5%; overflow-x: auto; scrollbar-width: none; background: rgba(0,0,0,0.5); }
        .filter-bar::-webkit-scrollbar { display: none; }
        .f-btn { background: #1c1c1e; border: 1px solid #2c2c2e; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; color: #8e8e93; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .f-btn.active { background: #007aff; color: #fff; border-color: #007aff; font-weight: bold; }

        /* الشبكة */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: rgba(20,20,22,0.9); border: 1px solid #222; border-radius: 25px; padding: 20px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #007aff; transform: translateY(-5px); }
        .icon { width: 60px; height: 60px; background: #007aff; border-radius: 18px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; }
        .try { background: #007aff; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<nav class="nav">
    <div class="logo">Misbar AI</div>
    <div class="search-area">
        <input type="text" id="sr" class="in-s" placeholder="ابحث في 15,000 أداة...">
        <button class="btn-s">بحث</button>
    </div>
    <div class="nav-r">
        <span style="color:#007aff; font-weight:bold; cursor:pointer;">تسجيل</span>
        <div style="border:1px solid #333; padding:5px 10px; border-radius:8px; cursor:pointer;">A文</div>
    </div>
</nav>

<div class="filter-bar" id="fBar"></div>
<div class="grid" id="mainGrid"></div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
// 1. تشغيل النجوم (بدون تعقيد)
particlesJS('particles-js', {
    "particles": { "number": { "value": 80 }, "color": { "value": "#ffffff" }, "shape": { "type": "circle" }, "opacity": { "value": 0.5 }, "size": { "value": 3 }, "line_linked": { "enable": false }, "move": { "enable": true, "speed": 1 } }
});

// 2. الفئات والبيانات
const cats = ['All', 'Writing', 'Image', 'Video', 'Coding', 'Audio', 'Design', 'Marketing', 'Data', '3D Render', 'Security', 'SEO', 'Email AI'];
const tools = Array.from({length: 100}, (_, i) => ({
    name: ['ChatGPT', 'Jasper', 'Claude', 'Luma'][i % 4] + ' ' + (i+1),
    cat: cats[(i % (cats.length - 1)) + 1].toLowerCase()
}));

// 3. بناء الفلاتر الـ 13
const fBar = document.getElementById('fBar');
fBar.innerHTML = cats.map((c, i) => `<button class="f-btn ${i===0?'active':''}" onclick="filterTools('${c.toLowerCase()}', this)">${c}</button>`).join('');

// 4. عرض الأدوات
function draw(list) {
    document.getElementById('mainGrid').innerHTML = list.map(t => `
        <div class="card">
            <div class="icon">${t.name[0]}</div>
            <div style="font-weight:700;">${t.name}</div>
            <button class="try">جرب الآن</button>
        </div>
    `).join('');
}

function filterTools(cat, btn) {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    draw(cat === 'all' ? tools : tools.filter(x => x.cat === cat));
}

// 5. محرك البحث الفوري
document.getElementById('sr').oninput = (e) => {
    const v = e.target.value.toLowerCase();
    draw(tools.filter(x => x.name.toLowerCase().includes(v)));
};

draw(tools);
</script>

</body>
</html>
