<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | رادار مِسبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* الأساسيات */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* الهيدر */
        .apple-nav { position: sticky; top: 0; backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; border-bottom: 0.5px solid #333; height: 70px; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 1.6rem; font-weight: 900; background: linear-gradient(to right, #00d1ff, #007aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .lang-dropdown { position: relative; cursor: pointer; padding: 10px; }
        .lang-menu { display: none; position: absolute; top: 100%; right: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border: 1px solid #333; border-radius: 12px; min-width: 160px; z-index: 1001; }
        .lang-menu a { display: block; color: white; padding: 10px; text-decoration: none; font-size: 0.9rem; }
        .lang-menu a:hover { background: rgba(255,255,255,0.1); }
        .lang-dropdown:hover .lang-menu { display: block; }

        /* البحث والسويتش */
        .nav-center { display: flex; align-items: center; gap: 20px; flex-grow: 1; justify-content: center; }
        .search-wrapper { display: flex; background: rgba(44, 44, 46, 0.8); border: 1px solid #333; border-radius: 12px; overflow: hidden; width: 350px; }
        .search-input { background: transparent; border: none; padding: 10px; color: #fff; flex-grow: 1; outline: none; }
        .search-btn-black { background: #111; color: #fff; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; border-right: 1px solid #333; }

        .switch-container { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #8e8e93; }
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007aff; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* الفيتشر كاردز الستة (تمت استعادتها) */
        .featured-slider { display: flex; padding: 20px 5%; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .hero-card { min-width: 300px; height: 200px; border-radius: 25px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border: 1px solid #333; flex-shrink: 0; scroll-snap-align: start; }

        /* الفلترة */
        .filter-tags { display: flex; gap: 10px; padding: 10px 5%; overflow-x: auto; scrollbar-width: none; align-items: center; }
        .tag-btn { background: rgba(255, 255, 255, 0.08); color: #eee; border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; }
        .tag-btn.active { background: #007aff; }
        
        .more-dropdown { position: relative; }
        .more-content { display: none; position: absolute; top: 110%; right: 0; background: rgba(0,0,0,0.95); border: 1px solid #333; border-radius: 12px; padding: 10px; min-width: 180px; z-index: 100; grid-template-columns: 1fr 1fr; gap: 8px; }
        .more-content button { background: #111; border: 1px solid #333; color: white; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
        .more-dropdown:hover .more-content { display: grid; }

        /* الشبكة والبطاقات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: rgba(28, 28, 30, 0.6); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; position: relative; backdrop-filter: blur(10px); transition: 0.3s; }
        .card:hover { border-color: #007aff; transform: translateY(-5px); }
        .tool-logo { width: 55px; height: 55px; border-radius: 14px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .badge { position: absolute; top: 10px; left: 10px; font-size: 9px; padding: 2px 8px; border-radius: 8px; }
        .free { background: rgba(52, 199, 89, 0.2); color: #34c759; }
        .paid { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .btn-try { background: #007aff; color: white; text-decoration: none; display: block; padding: 8px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; font-weight: bold; }

        /* الترقيم 1234 */
        .pagination { display: flex; justify-content: center; gap: 8px; padding: 40px 0; }
        .page-link { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid #333; cursor: pointer; color: #fff; background: rgba(255,255,255,0.05); }
        .page-link.active { background: #007aff; border-color: #007aff; }

        /* Footer */
        footer { background: #0a0a0a; padding: 60px 5% 30px; border-top: 1px solid #1a1a1a; margin-top: 50px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-logo { font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; }
        .footer-links h4 { color: #007aff; margin-bottom: 20px; font-size: 1rem; }
        .footer-links a { display: block; color: #8e8e93; text-decoration: none; margin-bottom: 10px; font-size: 0.85rem; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="nav-right">
            <div class="lang-dropdown">
                <span style="font-size: 1.3rem;">🌐</span>
                <div class="lang-menu">
                    <a href="#">العربية</a><a href="#">English</a><a href="#">Français</a>
                    <a href="#">Español</a><a href="#">Deutsch</a><a href="#">日本語</a>
                </div>
            </div>
            <div class="logo">Misbar AI</div>
        </div>

        <div class="nav-center">
            <div class="switch-container">
                <span>مجاني فقط</span>
                <label class="switch">
                    <input type="checkbox" id="freeOnlySwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="search-wrapper">
                <input type="text" id="smartSearch" class="search-input" placeholder="ابحث في 30,000 أداة...">
                <button class="search-btn-black">بحث</button>
            </div>
        </div>

        <div><span style="color:#007aff; cursor:pointer; font-weight:bold;">دخول</span></div>
    </nav>

    <div class="featured-slider" id="featuredZone"></div>

    <div class="filter-tags">
        <button class="tag-btn active">الكل</button>
        <button class="tag-btn">Writing</button>
        <button class="tag-btn">Image</button>
        <button class="tag-btn">Video</button>
        <button class="tag-btn">Coding</button>
        <div class="more-dropdown">
            <button class="tag-btn">المزيد ▼</button>
            <div class="more-content">
                <button>SEO</button><button>Email AI</button><button>Security</button>
                <button>3D</button><button>Data</button><button>Audio</button>
            </div>
        </div>
    </div>

    <div class="grid" id="mainGrid"></div>

    <div class="pagination">
        <div class="page-link">«</div>
        <div class="page-link active">1</div>
        <div class="page-link">2</div>
        <div class="page-link">3</div>
        <div class="page-link">4</div>
        <div class="page-link">»</div>
    </div>

    <footer>
        <div class="footer-grid">
            <div>
                <div class="footer-logo">Misbar AI</div>
                <p style="color:#8e8e93; font-size:0.85rem; line-height:1.6;">رادار مِسبار هو وجهتك الأولى لاكتشاف أدوات الذكاء الاصطناعي الأقوى والأحدث في العالم.</p>
            </div>
            <div class="footer-links">
                <h4>روابط</h4>
                <a href="#">الأدوات</a><a href="#">التصنيفات</a><a href="#">عن مِسبار</a>
            </div>
            <div class="footer-links">
                <h4>الدعم</h4>
                <a href="#">أضف أداة</a><a href="#">اتصل بنا</a><a href="#">الخصوصية</a>
            </div>
            <div>
                <h4>تواصل</h4>
                <input type="text" placeholder="إيميلك" style="width:100%; background:#111; border:1px solid #333; padding:10px; border-radius:8px; color:#fff; margin-bottom:10px;">
                <button style="width:100%; background:#007aff; border:none; padding:10px; border-radius:8px; color:#fff; font-weight:bold;">إرسال</button>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', { "particles": { "number": { "value": 40 }, "opacity": { "value": 0.2 }, "move": { "speed": 0.4 } } });

        // إنشاء 6 كروت فيتشر
        const heroes = ["Sora", "GPT-5", "Midjourney", "Claude", "Luma", "Gemini"];
        document.getElementById('featuredZone').innerHTML = heroes.map((name, i) => `
            <div class="hero-card" style="background: linear-gradient(transparent, rgba(0,0,0,0.9)), url('https://picsum.photos/400/300?sig=${i+20}') center/cover;">
                <h3 style="margin:0;">${name} AI</h3>
                <p style="margin:5px 0 0; font-size:0.75rem; color:#ccc;">استكشف ميزات ${name} الجديدة.</p>
            </div>
        `).join('');

        // إنشاء 60 بطاقة
        const mockData = Array.from({length: 60}, (_, i) => ({
            name: "أداة ذكية " + (i + 1),
            price: i % 3 === 0 ? 'free' : 'paid',
            color: `hsl(${i * 8}, 60%, 50%)`
        }));

        function render(data) {
            document.getElementById('mainGrid').innerHTML = data.map(item => `
                <div class="card">
                    <span class="badge ${item.price}">${item.price === 'free' ? 'مجاني' : 'مدفوع'}</span>
                    <div class="tool-logo" style="background:${item.color}">${item.name[0]}</div>
                    <div style="font-weight:bold; font-size:0.85rem;">${item.name}</div>
                    <a href="#" class="btn-try">جرب الآن</a>
                </div>
            `).join('');
        }
        render(mockData);

        // تنبيه السويتش
        document.getElementById('freeOnlySwitch').onchange = function() {
            alert("يرجى التسجيل لتفعيل تصفية الأدوات المجانية.");
            this.checked = false;
        };
    </script>
</body>
</html>
