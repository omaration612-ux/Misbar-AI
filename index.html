<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MISBAR AI | رادار مِسبار</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="auth-group">
            <button class="btn-outline">Sign In</button>
            <button class="btn-white">Sign Up</button>
        </div>
        <div class="dropdown logo-area">
            <div class="dropbtn logo-text">MISBAR AI ▼</div>
            <div class="dropdown-content white-elegant">
                <a href="#">العربية</a><a href="#">English</a><a href="#">Français</a>
                <a href="#">Español</a><a href="#">Deutsch</a><a href="#">Italiano</a>
                <a href="#">Türkçe</a><a href="#">日本語</a><a href="#">한국어</a><a href="#">中文</a>
            </div>
        </div>
    </header>

    <section class="filter-panel">
        <div class="search-bar">
            <div class="free-switch">
                <span>مجاني فقط</span>
                <label class="switch"><input type="checkbox" id="freeOnly"><span class="slider"></span></label>
            </div>
            <input type="text" id="smartSearch" placeholder="Search 30,000 tools...">
        </div>
        <div class="tags-container">
            <button class="tag active">الكل</button><button class="tag">كتابة</button>
            <button class="tag">صور</button><button class="tag">فيديو</button>
            <button class="tag">صوت</button><button class="tag">برمجة</button>
            <button class="tag">تصميم</button><button class="tag">بيانات</button>
            <div class="dropdown">
                <button class="tag dropbtn">المزيد ▼</button>
                <div class="dropdown-content white-elegant">
                    <a href="#">تسويق</a><a href="#">تعليم</a><a href="#">أعمال</a><a href="#">طب</a>
                    <a href="#">هندسة</a><a href="#">قانون</a><a href="#">ترجمة</a><a href="#">موسيقى</a>
                    <a href="#">أمن</a><a href="#">ألعاب</a>
                </div>
            </div>
        </div>
    </section>

    <main id="mainGrid"></main>

    <footer class="pro-footer">
        <div class="footer-logo">MISBAR AI</div>
        <div class="footer-links">
            <a href="#">عن المشروع</a><a href="#">الخصوصية</a><a href="#">اتصل بنا</a>
        </div>
        <p>© 2026 رادار مِسبار - الواقع أمام الأمنيات</p>
    </footer>
    <script src="engine.js" type="module"></script>
</body>
</html>
