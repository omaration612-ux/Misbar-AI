<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | مِسبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* الأساسيات */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* نافذة التنقل - Apple Style المطور */
        .apple-nav {
            position: sticky; top: 0; backdrop-filter: blur(25px);
            background: rgba(0,0,0,0.7); display: flex;
            justify-content: space-between; align-items: center;
            padding: 10px 5%; z-index: 1000;
            border-bottom: 0.5px solid #333; height: 60px;
        }

        /* تعديل 2: الشعار الجديد */
        .logo {
            font-size: 1.6rem; font-weight: 900;
            background: linear-gradient(to right, #00d1ff, #007aff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Cairo', sans-serif; /* لضمان الأناقة */
        }

        /* تعديل 1: حاوية البحث الجديدة */
        .search-area {
            display: flex; align-items: center; gap: 10px;
            width: 45%; justify-content: center;
        }

        .search-bar {
            flex-grow: 1; background: rgba(44, 44, 46, 0.8);
            border: 1px solid #333; padding: 10px 15px;
            border-radius: 14px; color: #fff; outline: none;
            transition: 0.3s;
        }
        
        /* زر البحث الجديد (مكان الخربشة الحمراء) */
        .search-btn {
            background: rgba(28, 28, 30, 0.6); /* أسود شفاف */
            color: #fff; /* نص أبيض أنيق */
            border: 1px solid #333;
            padding: 9px 20px; border-radius: 14px;
            cursor: pointer; font-size: 0.85rem; font-weight: bold;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .search-btn:hover { background: rgba(28, 28, 30, 0.9); border-color: #007aff; }

        /* تعديل 3: قائمة اللغات المنسدلة */
        .lang-dropdown { position: relative; display: inline-block; cursor: pointer; padding: 10px; }
        .lang-icon { color: #fff; font-size: 1.2rem; }
        .lang-content {
            display: none; position: absolute; left: 0; top: 100%;
            background-color: rgba(28, 28, 30, 0.8); /* أسود شفاف */
            backdrop-filter: blur(15px); min-width: 150px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1001;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        .lang-content a {
            color: #fff; padding: 12px 16px; text-decoration: none;
            display: block; font-size: 0.85rem; text-align: left;
            transition: 0.2s;
        }
        .lang-content a:hover { background-color: rgba(255, 255, 255, 0.1); }
        .lang-dropdown:hover .lang-content { display: block; }

        /* تعديل 4: شريط الفلترة الجديد (مكان الخربشات الزرقاء) */
        .filter-scroller {
            background: #000; padding: 15px 5% 5px;
            border-bottom: 0.5px solid #333;
        }
        .filter-tags {
            display: flex; gap: 12px;
            overflow-x: auto; scrollbar-width: none; /* Firefox */
            white-space: nowrap; padding-bottom: 10px;
        }
        .filter-tags::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tag-btn {
            background: rgba(255, 255, 255, 0.06);
            color: #efefef;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 20px; border-radius: 25px;
            cursor: pointer; font-size: 0.85rem;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .tag-btn:hover { background: rgba(255, 255, 255, 0.12); }
        .tag-btn.active {
            background: #007aff; border-color: #007aff;
            font-weight: bold;
        }

        /* باقي التنسيقات الأصلية (دون عبث) */
        .featured-slider { display: flex; padding: 20px 5%; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .featured-slider::-webkit-scrollbar { display: none; }
        .hero-card { min-width: 300px; height: 200px; border-radius: 25px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border: 1px solid #333; scroll-snap-align: start; flex-shrink: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: rgba(28, 28, 30, 0.6); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; transition: 0.3s; backdrop-filter: blur(10px); position: relative; }
        .card:hover { transform: translateY(-5px); border-color: #007aff; }
        .tool-logo { width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: #fff; }
        .badge { position: absolute; top: 10px; left: 10px; font-size: 9px; padding: 2px 8px; border-radius: 8px; }
        .free { background: rgba(52, 199, 89, 0.2); color: #34c759; }
        .paid { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .btn-try { background: #007aff; color: white; text-decoration: none; display: block; padding: 7px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="logo">Misbar AI</div>
        
        <div class="search-area">
            <input type="text" id="smartSearch" class="search-bar" placeholder="ابحث في 30,000 أداة...">
            <button class="search-btn">بحث</button>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="lang-dropdown">
                <span class="lang-icon">🌐</span>
                <div class="lang-content">
                    <a href="#">العربية</a>
                    <a href="#">English</a>
                    <a href="#">Français</a>
                    <a href="#">Español</a>
                    <a href="#">Deutsch</a>
                    <a href="#">日本語</a>
                    <a href="#">简体中文</a>
                    <a href="#">Русский</a>
                    <a href="#">Português</a>
                    <a href="#">हिन्दी</a>
                </div>
            </div>
            <span style="color: #007aff; cursor: pointer; font-size: 0.9rem;">تسجيل</span>
        </div>
    </nav>

    <div class="featured-slider" id="featuredZone"></div>

    <div class="filter-scroller">
        <div class="filter-tags" id="categoryFilters">
            <button class="tag-btn active" data-category="All">All</button>
            <button class="tag-btn" data-category="Writing">Writing</button>
            <button class="tag-btn" data-category="Image">Image</button>
            <button class="tag-btn" data-category="Video">Video</button>
            <button class="tag-btn" data-category="Coding">Coding</button>
            <button class="tag-btn" data-category="Audio">Audio</button>
            <button class="tag-btn" data-category="Design">Design</button>
            <button class="tag-btn" data-category="Marketing">Marketing</button>
            <button class="tag-btn" data-category="Data">Data</button>
            <button class="tag-btn" data-category="3D Render">3D Render</button>
            <button class="tag-btn" data-category="Security">Security</button>
            <button class="tag-btn" data-category="SEO">SEO</button>
            <button class="tag-btn" data-category="Email AI">Email AI</button>
        </div>
    </div>

    <div class="grid" id="mainGrid"></div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // 1. الخلفية
        particlesJS('particles-js', { "particles": { "number": { "value": 60 }, "color": { "value": "#ffffff" }, "shape": { "type": "circle" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": false }, "move": { "enable": true, "speed": 0.4 } } });

        // 2. كروت الفيتشر
        const heroData = [
            { title: "Sora Video", desc: "تحويل النص إلى فيديو واقعي", img: "101" },
            { title: "GPT-5 Turbo", desc: "الجيل القادم من الذكاء", img: "102" },
            { title: "Midjourney v7", desc: "فن رقمي لا حدود له", img: "103" },
            { title: "Claude 3.5", desc: "تحليل بيانات فائق السرعة", img: "104" },
            { title: "Luma Dream", desc: "تحريك الصور بلمسة واحدة", img: "105" },
            { title: "Gemini Pro", desc: "دمج متكامل مع جوجل", img: "106" }
        ];

        document.getElementById('featuredZone').innerHTML = heroData.map(h => `
            <div class="hero-card" style="background: linear-gradient(transparent, rgba(0,0,0,0.9)), url('https://picsum.photos/400/300?sig=${h.img}') center/cover;">
                <h3 style="margin:0; font-size:1.1rem;">${h.title}</h3>
                <p style="margin:5px 0 0; font-size:0.75rem; color:#ccc;">${h.desc}</p>
            </div>
        `).join('');

        // 3. البطاقات (دون عبث)
        const cats = ['Writing', 'Image', 'Video', 'Coding', 'Audio', 'Design', 'Marketing', 'Data', '3D Render', 'Security', 'SEO', 'Email AI'];
        const mockData = Array.from({length: 24}, (_, i) => ({
            name: ['Tool', 'AI', 'Smart', 'Probe'][i % 4] + " " + (i + 1),
            price: i % 2 === 0 ? 'free' : 'paid',
            category: cats[i % cats.length],
            color: `hsl(${i * 15}, 70%, 50%)`
        }));

        function render(data) {
            document.getElementById('mainGrid').innerHTML = data.map(item => `
                <div class="card">
                    <span class="badge ${item.price}">${item.price === 'free' ? 'مجاني' : 'مدفوع'}</span>
                    <div class="tool-logo" style="background:${item.color}">${item.name[0]}</div>
                    <div style="font-weight:bold; font-size:0.85rem;">${item.name}</div>
                    <div style="color:#8e8e93; font-size:0.65rem; margin-top:4px;">${item.category}</div>
                    <a href="#" class="btn-try">جرب الآن</a>
                </div>
            `).join('');
        }

        // الفلترة والبحث
        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelector('.tag-btn.active').classList.remove('active');
                this.classList.add('active');
                const c = this.dataset.category;
                render(c === 'All' ? mockData : mockData.filter(x => x.category === c));
            });
        });

        document.getElementById('smartSearch').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(mockData.filter(x => x.name.toLowerCase().includes(v)));
        };

        render(mockData);
    </script>
</body>
</html>
