<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbar AI | رادار مِسبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* الأساسيات */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* الهيدر */
        .apple-nav { position: sticky; top: 0; backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; border-bottom: 0.5px solid #333; height: 75px; }
        .logo { font-size: 1.7rem; font-weight: 900; background: linear-gradient(to right, #00d1ff, #007aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-center { display: flex; align-items: center; gap: 20px; flex-grow: 1; justify-content: center; }
        .search-wrapper { display: flex; background: rgba(44, 44, 46, 0.8); border: 1px solid #333; border-radius: 14px; overflow: hidden; width: 380px; }
        .search-input { background: transparent; border: none; padding: 12px; color: #fff; flex-grow: 1; outline: none; font-family: 'Cairo'; }
        .search-btn-black { background: #111; color: #fff; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; border-right: 1px solid #333; }

        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #8e8e93; }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* الفيتشر كاردز */
        .featured-slider { display: flex; padding: 25px 5%; gap: 18px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .hero-card { min-width: 320px; height: 220px; border-radius: 28px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; border: 1px solid #333; flex-shrink: 0; scroll-snap-align: start; }

        /* التصنيفات */
        .filter-tags { display: flex; justify-content: center; gap: 10px; padding: 20px 5%; overflow-x: auto; scrollbar-width: none; white-space: nowrap; }
        .tag-btn { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; backdrop-filter: blur(5px); }
        .tag-btn.active { background: #007aff; border-color: #007aff; }

        /* الشبكة والبطاقات المحدثة */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 30px 5%; 
        }

        .card { 
            background: rgba(28, 28, 30, 0.6); 
            border-radius: 26px; 
            padding: 25px 20px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.08); 
            position: relative; 
            backdrop-filter: blur(20px); 
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            display: flex;
            flex-direction: column;
            min-height: 320px; /* طول البطاقة المطلوب */
        }

        .card:hover { border-color: #007aff; transform: translateY(-10px); background: rgba(38, 38, 40, 0.8); }
        
        .tool-logo { width: 70px; height: 70px; border-radius: 20px; margin: 5px auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .tool-name { font-weight: 900; font-size: 1.1rem; color: #fff; margin-bottom: 8px; }
        
        /* تنسيق الوصف الجديد */
        .tool-desc { 
            color: #8e8e93; 
            font-size: 0.85rem; 
            line-height: 1.5; 
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* عرض 3 أسطر فقط */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1; /* يستهلك المساحة الوسطى ليدفع الزر للأسفل */
        }

        .badge { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .free { background: rgba(52, 199, 89, 0.2); color: #34c759; border: 1px solid rgba(52, 199, 89, 0.3); }
        .paid { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); }
        
        .btn-try { background: #007aff; color: white; text-decoration: none; display: block; padding: 12px; border-radius: 16px; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .btn-try:hover { background: #0056b3; box-shadow: 0 5px 15px rgba(0,122,255,0.4); }

        /* نظام الترقيم */
        .pagination { display: flex; justify-content: center; gap: 10px; padding: 50px 0; }
        .page-link { padding: 10px 18px; border-radius: 12px; border: 1px solid #333; color: #fff; text-decoration: none; }
        .page-link.active { background: #007aff; border: none; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="apple-nav">
        <div class="nav-right">
            <div class="lang-dropdown">
                <span style="font-size: 1.4rem;">🌐</span>
                <div class="lang-menu">
                    <a href="#">العربية</a><a href="#">English</a>
                </div>
            </div>
            <div class="logo">Misbar AI</div>
        </div>

        <div class="nav-center">
            <div class="switch-container">
                <span>مجاني فقط</span>
                <label class="switch">
                    <input type="checkbox" id="freeOnlySwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="search-wrapper">
                <input type="text" id="smartSearch" class="search-input" placeholder="ابحث في 30,000 أداة ذكية...">
                <button class="search-btn-black">بحث</button>
            </div>
        </div>

        <div><button style="background:transparent; border:1.5px solid #007aff; color:#007aff; padding:8px 20px; border-radius:12px; font-weight:bold; cursor:pointer;">دخول</button></div>
    </nav>

    <div class="featured-slider" id="featuredZone"></div>

    <div class="filter-tags">
        <button class="tag-btn active">الكل</button>
        <button class="tag-btn">Writing</button>
        <button class="tag-btn">Image Generation</button>
        <button class="tag-btn">Video Editing</button>
    </div>

    <div class="grid" id="mainGrid"></div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', { "particles": { "number": { "value": 40 }, "opacity": { "value": 0.2 }, "move": { "speed": 0.4 } } });

        const heroes = [
            {n: "Sora Video", d: "تحويل النصوص لفيديوهات واقعية.", img: "21"},
            {n: "Midjourney v7", d: "توليد صور بجودة سينمائية مذهلة.", img: "23"}
        ];
        document.getElementById('featuredZone').innerHTML = heroes.map(h => `
            <div class="hero-card" style="background: linear-gradient(transparent, rgba(0,0,0,0.9)), url('https://picsum.photos/400/300?sig=${h.img}') center/cover;">
                <h3 style="margin:0; font-size:1.3rem;">${h.n}</h3>
                <p style="margin:8px 0 0; font-size:0.8rem; color:#ccc;">${h.d}</p>
            </div>
        `).join('');

        const mockData = Array.from({length: 20}, (_, i) => ({
            name: "أداة ذكية " + (i + 1),
            desc: "هذا النص هو مثال لوصف الأداة، حيث يتم شرح مميزات الأداة وكيف يمكن للمستخدم الاستفادة منها في مهامه اليومية.",
            price: i % 3 === 0 ? 'free' : 'paid',
            color: `hsl(${i * 12}, 60%, 45%)`
        }));

        function render(data) {
            document.getElementById('mainGrid').innerHTML = data.map(item => `
                <div class="card">
                    <span class="badge ${item.price}">${item.price === 'free' ? 'مجاني' : 'مدفوع'}</span>
                    <div class="tool-logo" style="background:${item.color}">${item.name[0]}</div>
                    <div class="tool-name">${item.name}</div>
                    <div class="tool-desc">${item.desc}</div>
                    <a href="#" class="btn-try">جرب الآن</a>
                </div>
            `).join('');
        }
        render(mockData);

        document.getElementById('freeOnlySwitch').onchange = function() {
            alert("هذه الميزة متاحة للمسجلين فقط.");
            this.checked = false;
        };
    </script>
</body>
</html>
