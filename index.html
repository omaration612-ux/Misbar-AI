<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<h1 class="main-logo">Misbar <span class="ai-glow">Ai</span></h1>        </div>

    <section class="rolling-features">
        <div class="feat-track">
            <div class="f-card gold-style"><span>مختارات اليوم</span><h2>Midjourney 2</h2></div>
            <div class="f-card glass-style"><span>مختارات اليوم</span><h2>ChatGPT 1</h2></div>
            <div class="f-card blue-style"><span>مختارات اليوم</span><h2>Claude 3</h2></div>
            <div class="f-card green-style"><span>مختارات اليوم</span><h2>Sora AI</h2></div>
            <div class="f-card red-style"><span>مختارات اليوم</span><h2>Luma Dream</h2></div>
            <div class="f-card cyan-style"><span>مختارات اليوم</span><h2>Gemini Pro</h2></div>
        </div>
    </section>

    <section class="search-container-pro">
        <div class="color-tags-pro">
            <button class="tag-pro active">All</button>
            <button class="tag-pro">Writing</button>
            <button class="tag-pro">Image</button>
            <button class="tag-pro">Video</button>
            <button class="tag-pro">Coding</button>
            <button class="tag-pro">Audio</button>
            </div>

    <main id="mainGrid" class="grid-6x10">
        </main>

    <div class="pagination-glass-rolling">
        <div class="rolling-pages">
            <span class="p-num active">1</span>
            <span class="p-num">2</span>
            <span class="p-num">3</span>
            <span class="p-num">4</span>
            <span class="p-num">5</span>
            <span class="p-num">6</span>
            </div>
    </div>

    <footer class="mega-footer-contrast">
        <div class="f-grid">
<div class="f-col">
    <h2>Misbar <span class="ai-glow">Ai</span></h2>
    <p>مِسبارك العالمي للذكاء الاصطناعي</p>
</div>
            <div class="f-col">
                <h3>روابط</h3>
                <a href="#">اتصل بنا</a>
                <a href="#">الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        particlesJS('particles-js', {
            "particles": { 
                "number": { "value": 90 }, 
                "color": { "value": "#00f2ff" }, 
                "shape": { "type": "circle" }, 
                "opacity": { "value": 0.3 }, 
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.2, "width": 1 }, 
                "move": { "enable": true, "speed": 2 } 
            }
        });
    </script>
    

<script src="data-engine.js"></script>
<script src="firebase-bridge.js"></script>
<script src="misbar-core.js"></script>
<script src="fixer.js"></script> <script src="injector.js"></script>
<script src="misbar-guard.js"></script>
<script>
window.onload = () => {
    console.log("🛰️ رادار مِسبار: جاري تشغيل الأنظمة...");

    // 1. تشغيل العقل والحماية (منع الكشط)
    if (typeof MisbarBrain !== 'undefined') {
        MisbarBrain.init();
    }
    
    // 2. حقن البيانات (ربط المحرك بالمحقن)
    if (typeof MisbarInjector !== 'undefined') {
        // إذا كانت البيانات في data-engine تسمى tools
        MisbarInjector.allTools = (typeof MisbarData !== 'undefined') ? MisbarData.tools : [];
        MisbarInjector.init(); 
    }

    // 3. منع الاهتزاز: إيقاف أي تدخل خارجي في الـ Grid بعد التحميل
    const grid = document.getElementById('mainGrid');
    if (grid) {
        grid.style.transition = "opacity 0.3s ease";
    }
};

// 4. الرادار (البحث اللحظي الذكي) - نسخة محسنة لـ 30,000 أداة
let searchDebounce;
document.addEventListener('input', (e) => {
    if (e.target.id === 'smartSearch' && typeof MisbarInjector !== 'undefined') {
        
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
            const term = e.target.value.toLowerCase().trim();
            const grid = document.getElementById('mainGrid');

            // تأثير بصري ناعم أثناء الفلترة لمنع القفز المفاجئ
            if (grid) grid.style.opacity = '0.6';

            const filtered = MisbarInjector.allTools.filter(t => 
                (t.name && t.name.toLowerCase().includes(term)) || 
                (t.category && t.category.toLowerCase().includes(term)) ||
                (t.desc && t.desc.toLowerCase().includes(term))
            );

            MisbarInjector.renderTools(filtered);

            if (grid) grid.style.opacity = '1';
        }, 200); // تأخير بسيط (Debounce) لمنع الـ Lag أثناء الكتابة
    }
});
</script>
</body>
</html>
